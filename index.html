<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Video Viewer</title>
  <style>
    .controls {
      margin: 8px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    textarea {
      width: 100%;
      height: 160px;
      margin-top: 8px;
      font-family: monospace;
    }
    button {
      padding: 6px 12px;
      font-size: 14px;
    }
    .video-wrapper {
  position: relative;
}

#player {
  width: 100%;
  height: auto;
}

/* デフォルト（縦向き）：普通に下に表示 */
.overlay-controls {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

/* 横向きのときだけオーバーレイ */
@media (orientation: landscape) {
  .overlay-controls {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;

    padding: 6px 8px;
    background: rgba(0, 0, 0, 0.45);
    border-radius: 8px;
    backdrop-filter: blur(2px);
  }

  .overlay-controls button {
    color: #fff;
    background: rgba(0, 0, 0, 0.6);
    border: none;
  }
}
  </style>
</head>
<body>
  
<div class="video-wrapper">
  
<video id="player" controls preload="metadata" playsinline webkit-playsinline></video>
  
  <div class="overlay-controls">
    <button id="prevVideo">◀</button>
    <button id="togglePlay">⏯</button>
    <button id="nextVideo">▶</button>

    <button id="back10">-10</button>
    <button id="back5">-5</button>
    <button id="back3">-3</button>

    <button id="fwd5">+5</button>
    <button id="fwd10">+10</button>
    <button id="memoBtn">メモ</button>
  </div>
</div>
  
<div class="controls">
  <button id="prevVideo">前の動画</button>
  <button id="nextVideo">次の動画</button>
</div>
<div class="controls">
  <button id="togglePlay">再生</button>
</div>

<div class="controls">
  <button id="back10">-10s</button>
  <button id="back5">-5s</button>
  <button id="back3">-3s</button>
  <button id="fwd5">+5s</button>
  <button id="fwd10">+10s</button>
</div>

<div class="controls">
  <button id="memoBtn">メモ</button>
</div>

<textarea id="memo" placeholder="ここに自由にメモできます"></textarea>

<script src="video/index.js">
</script>
<script>
const video = document.getElementById('player');
const memoArea = document.getElementById('memo');

const list = window.videoList || [];
let currentIndex = 0;

// 初期動画（最新）
if (list.length > 0) {
  setVideo(0);
}

function setVideo(index) {
  if (index < 0) index = 0;
  if (index >= list.length) index = list.length - 1;

  currentIndex = index;
  video.src = `video/${list[currentIndex]}`;
  video.currentTime = 0;
  video.play();
}

// 前後動画ボタン
document.getElementById('prevVideo').onclick = () => setVideo(currentIndex - 1);
document.getElementById('nextVideo').onclick = () => setVideo(currentIndex + 1);

// 再生位置操作
function seek(delta) {
  if (!video.duration || isNaN(video.duration)) return;

  let t = video.currentTime + delta;
  if (t < 0) t = 0;
  if (t > video.duration) t = video.duration;
  video.currentTime = t;
}

document.getElementById('back10').onclick = () => seek(-10);
document.getElementById('back5').onclick  = () => seek(-5);
document.getElementById('back3').onclick  = () => seek(-3);
document.getElementById('fwd5').onclick   = () => seek(5);
document.getElementById('fwd10').onclick  = () => seek(10);

// mm:ss 形式
function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// メモ追加
document.getElementById('memoBtn').onclick = () => {
  const filename = list[currentIndex];
  const time = formatTime(video.currentTime);

  const lines = memoArea.value.split('\n');
  let inserted = false;

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].trim() === filename) {
      // 次の行に時間を挿入
      lines.splice(i + 1, 0, time);
      inserted = true;
      break;
    }
  }

  if (!inserted) {
    if (memoArea.value.trim() !== '') lines.push('');
    lines.push(filename);
    lines.push(time);
  }

  memoArea.value = lines.join('\n');
};

const toggleBtn = document.getElementById('togglePlay');

// 初期ラベル調整
video.onplay = () => toggleBtn.textContent = '停止';
video.onpause = () => toggleBtn.textContent = '再生';

toggleBtn.onclick = () => {
  if (video.paused) {
    video.play();
  } else {
    video.pause();
  }
};
</script>

</body>
</html>
