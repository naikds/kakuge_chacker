<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Video Viewer</title>
  <style>
    .controls {
      margin: 8px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      padding: 6px 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<video id="player" controls width="100%" preload="metadata"></video>

<div class="controls">
  <button id="prevVideo">前の動画</button>
  <button id="nextVideo">次の動画</button>
</div>

<div class="controls">
  <button id="back3">-3s</button>
  <button id="fwd5">+5s</button>
  <button id="fwd10">+10s</button>
</div>

<script src="video/index.js"></script>
<script>
const video = document.getElementById('player');

// 再生リスト
const list = window.videoList || [];
let currentIndex = 0;

// 初期セット（最新＝先頭）
if (list.length > 0) {
  setVideo(0);
}

function setVideo(index) {
  if (index < 0) index = 0;
  if (index >= list.length) index = list.length - 1;

  currentIndex = index;
  video.src = `video/${list[currentIndex]}`;
  video.currentTime = 0;
  video.play();
}

// 前・次 動画
document.getElementById('prevVideo').onclick = () => {
  setVideo(currentIndex - 1);
};

document.getElementById('nextVideo').onclick = () => {
  setVideo(currentIndex + 1);
};

// 再生位置移動
function seek(deltaSeconds) {
  if (!video.duration || isNaN(video.duration)) return;

  let target = video.currentTime + deltaSeconds;
  if (target < 0) target = 0;
  if (target > video.duration) target = video.duration;

  video.currentTime = target;
}

document.getElementById('back3').onclick = () => seek(-3);
document.getElementById('fwd5').onclick  = () => seek(5);
document.getElementById('fwd10').onclick = () => seek(10);
</script>

</body>
</html>
